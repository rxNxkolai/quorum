<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 132" width="500" height="132" fill="none" role="img" aria-label="Quorum">
  <title>Quorum</title>
  <defs>
    <radialGradient id="glow" cx="20%" cy="34%" r="58%">
      <stop offset="0%" stop-color="#a371f7" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#a371f7" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect x="0.5" y="0.5" width="499" height="131" rx="18" fill="#0b0e14" stroke="#222a38" />
  <rect x="0.5" y="0.5" width="499" height="131" rx="18" fill="url(#glow)" />
  <!-- mark: a council of violet nodes around a central agent -->
  <g transform="translate(26,12)">
    <g stroke="#a371f7" stroke-opacity="0.3" stroke-width="1.6">
      <line x1="54" y1="54" x2="54" y2="20" />
      <line x1="54" y1="54" x2="80.6" y2="32.8" />
      <line x1="54" y1="54" x2="87.1" y2="61.6" />
      <line x1="54" y1="54" x2="68.8" y2="84.6" />
      <line x1="54" y1="54" x2="39.2" y2="84.6" />
      <line x1="54" y1="54" x2="20.9" y2="61.6" />
      <line x1="54" y1="54" x2="27.4" y2="32.8" />
    </g>
    <g fill="#a371f7">
      <circle cx="80.6" cy="32.8" r="4.2" fill-opacity="0.72" />
      <circle cx="87.1" cy="61.6" r="4.2" fill-opacity="0.72" />
      <circle cx="68.8" cy="84.6" r="4.2" fill-opacity="0.72" />
      <circle cx="39.2" cy="84.6" r="4.2" fill-opacity="0.72" />
      <circle cx="20.9" cy="61.6" r="4.2" fill-opacity="0.72" />
      <circle cx="27.4" cy="32.8" r="4.2" fill-opacity="0.72" />
      <circle cx="54" cy="20" r="5.6" />
    </g>
    <circle cx="54" cy="54" r="8.5" fill="#0b0e14" stroke="#e8edf5" stroke-width="2" />
    <circle cx="54" cy="54" r="2.6" fill="#e8edf5" />
  </g>
  <!-- wordmark -->
  <text x="150" y="66" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-size="42" font-weight="700" letter-spacing="-1.2" fill="#e8edf5">Quorum</text>
  <text x="152" y="93" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-size="15" font-weight="500" letter-spacing="0.2" fill="#9aa4b2">a council that keeps your AI agent honest</text>
</svg>
